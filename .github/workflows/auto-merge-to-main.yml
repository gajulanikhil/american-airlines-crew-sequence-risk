name: Auto Merge Develop to Main

on:
  push:
    branches:
      - develop          # triggers only when you push to develop

jobs:
  auto-merge:
    name: Merge develop → main
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Checkout the full repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0         # need full history for merge to work
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2 — Setup Git identity
      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Step 3 — Run your tests before merging
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ -v --tb=short
        continue-on-error: false   # if tests fail, stop here — do NOT merge

      # Step 4 — Attempt merge into main
      - name: Merge develop into main
        run: |
          git checkout main
          git merge develop --no-ff -m "Auto-merge develop into main [skip ci]"
          git push origin main

      # Step 5 — Notify success
      - name: Confirm merge
        run: echo "✅ develop successfully merged into main"